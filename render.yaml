services:
  # Base de données MySQL (déployée comme service Docker car Render n'a pas de MySQL managé)
  - type: web
    name: library-db
    env: docker
    plan: starter
    dockerContext: .
    dockerFilePath: ./db.Dockerfile
    healthCheckPath: /
    envVars:
      - key: MYSQL_DATABASE
        value: library_db
      - key: MYSQL_ROOT_PASSWORD
        value: Youssouf2000
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # Backend NestJS
  - type: web
    name: library-api
    env: docker
    dockerContext: .
    dockerFilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: DB_HOST
        value: library-db
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: library_db
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: Youssouf2000
      - key: DB_SYNC
        value: "true"

  # Frontend React
  - type: web
    name: library-frontend
    env: docker
    dockerContext: library-frontend
    dockerFilePath: Dockerfile
    plan: starter
    envVars:
      - key: VITE_API_URL
        fromService:
          name: library-api
          type: web
          property: host

